<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <title>你问我答</title>
        <meta http-equiv="Content-Type" content="text/html" ; charset="utf-8">
        <link rel="shortcut icon" href='tgato.png' />
        <style>
            @font-face {
              font-family: "title";
              src: url("fonts/title.ttf");
            }
            body {
              font-family:'Roboto', arial, helvetica, sans-serif;
              font-weight: normal;
              font-style: normal;
              font-size: medium;
              background-image:url('bricks.png');
            }
            A {
              color: #5168CF;
              text-decoration: none;
            }
            h2 {
              margin-bottom: 0.3em
            }
            .tableRoot {
              margin: 0 auto;
              min-width: 850px;
              background-color: white;
              box-shadow: 0px 0px 20px #CCCCCC;
              border: 0px solid #808080;
              /* Use border-spacing instead of border-collapse, otherwise IE doesn't show the shadow */
              border-spacing:0;
            }
            .header {
              background-color: #000001;
              padding-bottom: 0.32em;
            }
            .headerTitle {
              font-family:'title';
              font-size:300%;
              font-weight:bold;
              padding-left: 20px;
              padding-right: 40px;
              line-height: 1.3em;
            }
            .headerTitle A {
              color: #F0F3FF;
              text-decoration: none;
            }
            .headerNav {
              text-align: left;
              background-color: #000001;
              border-width: 0px;
              margin-left: 0px
            }
            .headerNav A {
              color: #F0F3FF;
              text-decoration: none;
              padding-left: 1em;
              padding-right: 1em;
              padding-top: 0.3em;
              padding-bottom: 0.3em;
            }
            .headerNav A:hover {
              background-color: #bcbcbc;
              transition: .25s;
              text-decoration: none;
            }
            .content {
              padding: 18px;
              padding-top: 10px;
              text-align: left;
              text-indent: 0px;
              margin: 10px;
            }
            .content A:hover {
            }
            .footer {
              font-size:small;
              text-align: right;
              background-color: #5a5a5a;
              padding-left: 0.3em;
              padding-right: 0.3em;
              padding-top: 0.5em;
              padding-bottom: 0.5em;
            }
            .footerIcon {
            }
            .footerIcon IMG {
              margin-bottom: -0.3em;
              margin-right: 0.7em;
              width: 1.2em;
              height: 1.2em;
            }
            .footerText A {
              text-decoration: none;
              padding-left: 0.7em;
              padding-right: 0.7em;
              padding-top: 0.2em;
              padding-bottom: 0.2em;
              color: #F0F3FF;
            }
            .footerText A:hover {
              text-decoration: none;
              background-color: #bcbcbc;
              transition: .25s;
              color: #F0F3FF;
            }
            .downloads {
              width: 100%
            }
            .spoilerLink {
              line-height: 200%;
            }
            .showAll {
              text-align: center;
              margin-top: 2em;
            }
            .downloadTable {
              border-collapse: collapse;
              width: auto;
              line-height: 200%;
            }
            .downloadLine {
            }
            /* Columns */
            .downloadLine .colFile {
              width: 270px;
              padding-left: 10px;
            }
            .downloadLine .colDownload A,
            .downloadButton A {
              width: 80px;
              text-align: center;
              padding-left: 1em;
              padding-right: 1em;
              padding-top: 0.2em;
              padding-bottom: 0.2em;
              border: 1px solid #5168CF;
            }
            .downloadLine .colMirror {
              width: 100px;
              text-align: center;
            }
            .downloadLine .colChangelog {
              width: 110px;
            }
            .downloadLine .colForge {
              width: 115px;
            }
            .downloadLine .colDate {
              width: 80px;
              text-align: right;
              padding-right: 10px;
            }
            /* Preview */
            .downloadLinePreview {
              background-color: #FFF6E3
            }
            /* Main */
            .downloadLineMain:first-child {
              background-color: #F0F3FF
            }
            .downloadLineMain:first-child .colDownload  A,
            .downloadButton A{
              font-weight: normal;
              color: white;
              background-color: #313E7C;
              border: 1px solid #313E7C;
            }
            .downloadLineMain:first-child .colDownload A:hover,
            .downloadButton A:hover{
              background-color: #6974A3;
              transition: .25s;
            }
            LI STRONG {
              line-height: 200%;
            }
            .tableDownload {
              margin: 0 auto;
            }
            .tableDonate TR {
              height: 35px;
            }
            .scaleNearest {
              image-rendering:optimizeSpeed;
              image-rendering:-moz-crisp-edges;
              image-rendering:-o-crisp-edges;
              image-rendering:-webkit-optimize-contrast;
              image-rendering:optimize-contrast;
              -ms-interpolation-mode:nearest-neighbor;
              image-rendering:pixelated;
            }
            .tableData {
              border-collapse: collapse;
            }
            .tableData th {
              color: #F0F3FF;
              background-color: #000001;
              font-weight: normal;
            }
            .tableData, .tableData th, .tableData td {
              border: 0px solid black;
            }
            .tableData th, .tableData td {
              padding-left:10px;
              padding-right:10px;
              padding-top:5px;
              padding-bottom:5px;
            }
            .tableDataDis {
              background-color: #DCDCDC
            }
            .tableDataIcon {
              width: 1.5em;
              height: 1.5em;
            }
            .tableDataCape {
              max-height: 44px;
            }
            .tableDataCentered {
              text-align: center;
            }
            .tableBanner {
              width: 100%;
              padding: 8px;
            }
            .tableBanner TR {
              text-align: center;
              margin: 0.3em;
            }
            .tableBanner TD {
              padding-top: 1em;
            }
            .tableBanner IMG {
              border: 1px solid #f0f0f0;
            }
            .tableBanner TD * {
              margin: 0.3em;
            }
            .tableBanners TR TD {
              padding: 9px;
              padding-right: 8px;
            }
            .tableBanners IMG {
              border: 1px solid #f0f0f0;
            }
            .bannerSelTable {
              width: 100%;
            }
            .bannerSelUser {
              text-align: right;
            }
            .bannerNav {
              text-align: center;
            }
            .bannerNav * {
              margin: 0.3em;
            }
            TD .tableDataEditable {
              background-color: #FFF6E3;
              border: 2px solid transparent;
            }
            input,
            select {
              font-family:'Roboto', arial, helvetica, sans-serif;
              font-weight: normal;
              font-style: normal;
              font-size: medium;
              padding: 2px;
            }
            input[type=submit] {
              padding-left: 1em;
              padding-right: 1em;
              padding-top: 0.2em;
              padding-bottom: 0.2em;
            }
            input[type=checkbox] {
              transform : scale(1.3);
            }
        </style>
    </head>
    <body>
    <table class="tableRoot">
        <tbody>
        <tr>
            <td class="header">
            <span class="headerTitle">
                <a href="index.html">
                    TGATO
                </a>
            </span>
            <span class="headerNav">
                <a href="index.html">
                    主页
                </a>
                <a href="history.html">
                    历史沿革
                </a>
                <a href="donate.html">
                    赞助
                </a>
                <a href="faq.html">
                    问题
                </a>
                <a href="downloads.html">
                    资源下载
                </a>
            </span>
            </td>
        </tr>
        <tr>
            <td class="content">
                <!-- Content -->
                <h1 class="text-4xl ml-[5px]">
                    问答环节
                </h1>
                <h2>
                    —
                </h2>
                <h2 class="text-4xl ml-[5px]">
                    我能否加入冶天联盟？
                </h2>
                <p class="text-4xl ml-[5px]">
                    能，但必须经过面试官(陈梓鑫)的批准
                </p>
                <h2 class="text-4xl ml-[5px]">
                    我能否向其他人宣传"冶天联盟"？
                </h2>
                <p>
                    不能
                </p>
                <h2 class="text-4xl ml-[5px]">
                    不同版本的资源包有什么区别？
                </h2>
                <p>
                    测试版最不稳定，功能最少，但最先发布；
                </p>
                <p>
                    快照版更新频繁，稳定性差
                </p>
                <p>
                    正式版经测试，稳定性好
                </p>
                <h2>
                    冶天联盟领导人员(按字母顺序排序)
                </h2>
                <p>
                    陈梓鑫、张浩天、张逍昊
                </p>
                <h2>
                    你们如何开发资源包？
                </h2>
                <p>
                    1.魔改其他资源包的内容并添加到自己的资源包内
                </p>
                <p>
                    2.自己研发
                </p>
                <h2>
                    冶天联盟的重要开发者成员(按字母顺序排序)
                </h2>
                <p>
                    张浩天(AlanHT520)
                </p>
                <p>
                    张浩川(FlomeHC520)
                </p>
            </td>
        </tr>
        </tbody>
    </table>
    </body>
</html>
